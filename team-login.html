<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Team Sign In · AMIRA</title>
  <meta name="robots" content="noindex" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ivory:         #FDFBF7;
      --cream:         #F5EDE0;
      --champagne:     #B8956A;
      --champagne-deep:#9A7A56;
      --champ-pale:    #F0E6D6;
      --taupe:         #8C7B6B;
      --dark:          #2C2420;
      --border:        #E8DFD0;
      --error:         #B53A30;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100%;
      background: var(--ivory);
      color: var(--dark);
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 17px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      background:
        radial-gradient(circle at 20% 10%, rgba(184, 149, 106, 0.07), transparent 50%),
        radial-gradient(circle at 80% 90%, rgba(184, 149, 106, 0.05), transparent 50%),
        var(--ivory);
    }

    /* ─── header ─── */
    header {
      padding: 28px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .wordmark {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      letter-spacing: 0.04em;
      color: var(--dark);
      text-decoration: none;
      line-height: 1;
    }

    .wordmark em {
      font-family: 'Outfit', sans-serif;
      font-style: normal;
      font-weight: 400;
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.3em;
      color: var(--champagne);
      display: block;
      margin-top: 4px;
    }

    .back-link {
      font-family: 'Outfit', sans-serif;
      font-size: 11px;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 0.24em;
      color: var(--taupe);
      text-decoration: none;
      transition: color 0.2s;
    }

    .back-link:hover {
      color: var(--dark);
    }

    /* ─── main ─── */
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px 80px;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: #fff;
      border: 1px solid var(--border);
      padding: 56px 48px 48px;
      position: relative;
      box-shadow: 0 20px 60px -20px rgba(44, 36, 32, 0.15);
      animation: rise 0.7s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--champagne), transparent);
    }

    .eyebrow {
      font-family: 'Outfit', sans-serif;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.32em;
      color: var(--champagne);
      margin-bottom: 14px;
      text-align: center;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-weight: 400;
      font-size: 34px;
      line-height: 1.15;
      text-align: center;
      margin-bottom: 10px;
    }

    h1 em {
      font-style: italic;
      color: var(--champagne);
      font-weight: 400;
    }

    .subhead {
      font-family: 'Cormorant Garamond', serif;
      font-size: 16px;
      color: var(--taupe);
      text-align: center;
      margin-bottom: 40px;
      font-style: italic;
    }

    /* ─── form ─── */
    .field {
      margin-bottom: 28px;
    }

    label {
      display: block;
      font-family: 'Outfit', sans-serif;
      font-size: 10px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.24em;
      color: var(--taupe);
      margin-bottom: 10px;
    }

    input {
      width: 100%;
      border: none;
      border-bottom: 1px solid var(--border);
      background: transparent;
      padding: 8px 0 10px;
      font-family: 'Cormorant Garamond', serif;
      font-size: 18px;
      color: var(--dark);
      outline: none;
      transition: border-color 0.25s;
    }

    input:focus {
      border-bottom-color: var(--champagne);
    }

    /* ─── button ─── */
    button {
      width: 100%;
      margin-top: 12px;
      padding: 16px;
      background: var(--dark);
      color: var(--ivory);
      border: none;
      font-family: 'Outfit', sans-serif;
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.32em;
      cursor: pointer;
      transition: background 0.2s, transform 0.05s;
    }

    button:hover:not(:disabled) {
      background: var(--champagne-deep);
    }

    button:active:not(:disabled) {
      transform: translateY(1px);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .spinner {
      display: inline-block;
      width: 11px;
      height: 11px;
      border: 1.5px solid rgba(253, 251, 247, 0.3);
      border-top-color: var(--ivory);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: -1px;
      margin-right: 10px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── error ─── */
    .error {
      margin-top: 22px;
      padding: 12px 16px;
      background: rgba(181, 58, 48, 0.06);
      border-left: 2px solid var(--error);
      color: var(--error);
      font-family: 'Cormorant Garamond', serif;
      font-size: 15px;
      font-style: italic;
      display: none;
    }

    .error.show {
      display: block;
      animation: shake 0.4s;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25%      { transform: translateX(-4px); }
      75%      { transform: translateX(4px); }
    }

    /* ─── footer ─── */
    footer {
      padding: 24px 40px;
      text-align: center;
      font-family: 'Outfit', sans-serif;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.28em;
      color: var(--taupe);
    }

    footer span { color: var(--champagne); }

    /* ─── mobile ─── */
    @media (max-width: 520px) {
      header { padding: 20px 24px; }
      footer { padding: 20px 24px; }
      .card  { padding: 44px 28px 36px; }
      h1     { font-size: 28px; }
    }
  </style>
</head>
<body>
  <header>
    <a href="/" class="wordmark">
      AMIRA
      <em>Human Software Resources</em>
    </a>
    <a href="/" class="back-link">← Back</a>
  </header>

  <main>
    <div class="card">
      <div class="eyebrow">Team Access</div>
      <h1>Welcome <em>back</em></h1>
      <p class="subhead">Sign in to continue.</p>

      <form id="login-form" novalidate>
        <div class="field">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" autocomplete="username" required spellcheck="false" autocapitalize="off" />
        </div>

        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" autocomplete="current-password" required />
        </div>

        <button type="submit" id="submit-btn">
          <span id="btn-text">Sign In</span>
        </button>

        <div id="error" class="error" role="alert" aria-live="polite"></div>
      </form>
    </div>
  </main>

  <footer>
    AMIRA <span>·</span> Human Software Resources
  </footer>

  <script>
    /* ============================================================
       Team login — routes users to their product
       ============================================================

       Strategy: try Royale (Better Auth) first, then JLIC (custom
       JWT). Whichever accepts the credentials wins.

       Backend requirements before this works:

       1. Royale (royale.amirahsr.org): Better Auth needs CORS to
          allow origin 'https://amirahsr.org' WITH credentials.
          In your better-auth config, set:
            trustedOrigins: ['https://amirahsr.org']
          (or add the CORS middleware that matches your setup)

       2. JLIC (secretary.amirahsr.org): the auth route needs CORS
          to allow origin 'https://amirahsr.org'. Add @hono/cors
          middleware on that route (no credentials needed since it
          returns a bearer JWT in the body).

       3. (Future) jlic.amirahsr.org needs DNS + Caddy + the JLIC
          web frontend to actually exist. Until then, JLIC users
          will land on a broken page. That's fine — only you and the
          coordinators (max_sylvie@amira) are in there right now.
    ============================================================ */

    const ROYALE_LOGIN = 'https://royale.amirahsr.org/api/auth/sign-in/email';
    const ROYALE_DEST  = 'https://royale.amirahsr.org';
    const JLIC_LOGIN   = 'https://secretary.amirahsr.org/api/auth/login';
    const JLIC_DEST    = 'https://jlic.amirahsr.org';

    const form     = document.getElementById('login-form');
    const btn      = document.getElementById('submit-btn');
    const btnText  = document.getElementById('btn-text');
    const errorEl  = document.getElementById('error');

    function showError(msg) {
      errorEl.textContent = msg;
      errorEl.classList.remove('show');
      // restart animation
      void errorEl.offsetWidth;
      errorEl.classList.add('show');
    }

    function clearError() {
      errorEl.classList.remove('show');
    }

    function setLoading(loading) {
      btn.disabled = loading;
      btnText.innerHTML = loading
        ? '<span class="spinner"></span>Signing in…'
        : 'Sign In';
    }

    async function tryRoyale(email, password) {
      try {
        const res = await fetch(ROYALE_LOGIN, {
          method: 'POST',
          credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });
        return res.ok;
      } catch (e) {
        console.warn('Royale auth network/CORS error:', e);
        return false;
      }
    }

    async function tryJlic(email, password) {
      try {
        const res = await fetch(JLIC_LOGIN, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });
        if (!res.ok) return null;
        const data = await res.json();
        return data.token || null;
      } catch (e) {
        console.warn('JLIC auth network/CORS error:', e);
        return null;
      }
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearError();

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      if (!username || !password) {
        showError('Please enter your username and password.');
        return;
      }

      setLoading(true);

      // Note: backends still call the field "email" in their JSON contract,
      // so we send what the user typed as the `email` key regardless of
      // what we labelled it on the UI.
      // 1. Royale (Better Auth — sets session cookie on royale subdomain)
      if (await tryRoyale(username, password)) {
        window.location.href = ROYALE_DEST;
        return;
      }

      // 2. JLIC (returns JWT in body — passed via URL fragment so it
      //    isn't sent to the server or logged in CDN/access logs)
      const jlicToken = await tryJlic(username, password);
      if (jlicToken) {
        window.location.href = JLIC_DEST + '/#token=' + encodeURIComponent(jlicToken);
        return;
      }

      // Neither accepted
      setLoading(false);
      showError("That username and password don't match anything we recognise. Try again, or check with your team admin.");
    });
  </script>
</body>
</html>
